name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run svelte-check
        run: bun run check

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run vitest run

      - name: Build
        run: bun run build
